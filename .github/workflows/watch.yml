name: watch

on:
  schedule:
    - cron: "*/10 * * * *" # every ~10 min (GitHub cron is best-effort; may be delayed)
  workflow_dispatch: {} # a manual "run it now" button for testing

# Never let two runs (a delayed one + the next) race on the shared state.
concurrency:
  group: watchdog-state
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # State (encrypted roster cache + outage flags) lives in the Actions cache,
      # NOT in the repo — so user emails are never committed to a public repo, and
      # the cache is not publicly downloadable. Rotating key + restore-keys prefix
      # is the standard pattern for mutable state (cache keys are immutable).
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state
          key: watchdog-state-${{ github.run_id }}
          restore-keys: watchdog-state-

      - run: mkdir -p state

      - name: Poll and notify
        run: go run .
        env:
          STATUS_URL: ${{ secrets.STATUS_URL }}
          STATUS_TOKEN: ${{ secrets.STATUS_TOKEN }}
          ROSTER_KEY: ${{ secrets.ROSTER_KEY }}
          # SES (SMTP)
          SES_HOST: ${{ secrets.SES_HOST }}
          SES_PORT: ${{ secrets.SES_PORT }}
          SES_USER: ${{ secrets.SES_USER }}
          SES_PASS: ${{ secrets.SES_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          # ntfy (optional)
          NTFY_BASE: ${{ secrets.NTFY_BASE }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          # operator alerts (faster, technical)
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_NTFY_TOPIC: ${{ secrets.ADMIN_NTFY_TOPIC }}
          # thresholds (optional; defaults 45 / 10 minutes)
          DOWN_THRESHOLD_MIN: ${{ vars.DOWN_THRESHOLD_MIN }}
          OPERATOR_ALERT_MIN: ${{ vars.OPERATOR_ALERT_MIN }}

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: watchdog-state-${{ github.run_id }}
