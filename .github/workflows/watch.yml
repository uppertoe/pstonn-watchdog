name: watch

on:
  schedule:
    - cron: "*/10 * * * *" # every ~10 min (GitHub cron is best-effort; may be delayed)
  workflow_dispatch: {} # a manual "run it now" button for testing

# The run commits state/state.json (the outage timer/flags — no PII) so the
# escalation clock survives an Actions cache miss.
permissions:
  contents: write

# Serialize a delayed run and the next so they don't race on the shared state.
concurrency:
  group: watchdog-state
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # brings state/state.json from the repo

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # roster.enc (the user emails, encrypted) lives ONLY in the Actions cache —
      # never committed to this public repo. Rotating key + restore-keys prefix is
      # the standard pattern for mutable cache state (cache keys are immutable).
      - name: Restore roster cache
        uses: actions/cache/restore@v4
        with:
          path: state/roster.enc
          key: watchdog-roster-${{ github.run_id }}
          restore-keys: watchdog-roster-

      - name: Poll and notify
        run: go run .
        env:
          STATUS_URL: ${{ secrets.STATUS_URL }}
          STATUS_TOKEN: ${{ secrets.STATUS_TOKEN }}
          ROSTER_KEY: ${{ secrets.ROSTER_KEY }}
          # SES (SMTP)
          SES_HOST: ${{ secrets.SES_HOST }}
          SES_PORT: ${{ secrets.SES_PORT }}
          SES_USER: ${{ secrets.SES_USER }}
          SES_PASS: ${{ secrets.SES_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          # ntfy (optional)
          NTFY_BASE: ${{ secrets.NTFY_BASE }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          # operator alerts (faster, technical)
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_NTFY_TOPIC: ${{ secrets.ADMIN_NTFY_TOPIC }}
          # thresholds (optional; defaults 45 / 10 minutes)
          DOWN_THRESHOLD_MIN: ${{ vars.DOWN_THRESHOLD_MIN }}
          OPERATOR_ALERT_MIN: ${{ vars.OPERATOR_ALERT_MIN }}

      - name: Save roster cache
        if: always()
        run: mkdir -p state && [ -f state/roster.enc ] || : > state/roster.enc
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: state/roster.enc
          key: watchdog-roster-${{ github.run_id }}

      - name: Persist state (outage timer/flags — no PII)
        if: always()
        run: |
          git config user.name "pstonn-watchdog"
          git config user.email "watchdog@users.noreply.github.com"
          git add state/state.json
          if git diff --cached --quiet; then
            echo "no state change"
          else
            git commit -m "state: $(date -u +%FT%TZ)"
            git pull --rebase --autostash && git push
          fi
